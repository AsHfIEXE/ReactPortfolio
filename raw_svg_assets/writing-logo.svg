<svg id="write-svg" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-pink">
          <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
          <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
        </filter>
      </defs>
      <!-- Open book base -->
      <path d="M8 52 L8 22 Q8 18 12 18 Q24 18 36 24 Q48 18 60 18 Q64 18 64 22 L64 52 Q60 52 48 48 Q42 46 36 46 Q30 46 24 48 Q12 52 8 52 Z" fill="rgba(255,107,157,0.05)" stroke="#ff6b9d" stroke-width="1.2" stroke-linejoin="round" opacity="0.6"></path>
      <!-- Book spine -->
      <line x1="36" y1="24" x2="36" y2="46" stroke="#ff6b9d" stroke-width="1" opacity="0.4"></line>
      <!-- Lines on left page -->
      <line x1="14" y1="30" x2="32" y2="28" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.45"></line>
      <line x1="14" y1="35" x2="32" y2="33" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.35"></line>
      <line x1="14" y1="40" x2="28" y2="38.5" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.25"></line>
      <!-- Lines on right page -->
      <line x1="58" y1="30" x2="40" y2="28" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.45"></line>
      <line x1="58" y1="35" x2="40" y2="33" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.35"></line>
      <line x1="58" y1="40" x2="44" y2="38.5" stroke="#ff6b9d" stroke-width="0.9" stroke-linecap="round" opacity="0.25"></line>
      <!-- Pen nib hovering over book -->
      <path d="M50 8 L58 16 L52 22 L38 20 Z" fill="rgba(255,107,157,0.15)" stroke="#ff6b9d" stroke-width="1.2" stroke-linejoin="round" filter="url(#glow-pink)"></path>
      <!-- Pen body -->
      <path d="M50 8 L46 4 L40 10 L44 14 Z" fill="rgba(255,107,157,0.25)" stroke="#ff6b9d" stroke-width="1" stroke-linejoin="round"></path>
      <!-- Nib tip split -->
      <line x1="52" y1="22" x2="48" y2="26" stroke="#ff6b9d" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-pink)"></line>
      <!-- Ink drop -->
      <circle cx="47" cy="27.5" r="1.5" fill="#ff6b9d" opacity="0.85"></circle>
      <path d="M47 29 Q46.5 32 47 34" stroke="#ff6b9d" stroke-width="0.8" stroke-linecap="round" opacity="0.4"></path>
    </svg>
