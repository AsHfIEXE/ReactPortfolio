<svg id="dev-svg" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-amber">
          <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
          <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
        </filter>
      </defs>
      <!-- Terminal window frame -->
      <rect x="8" y="12" width="56" height="48" rx="6" fill="rgba(255,179,71,0.04)" stroke="#ffb347" stroke-width="1.2" opacity="0.6"></rect>
      <!-- Title bar -->
      <line x1="8" y1="24" x2="64" y2="24" stroke="#ffb347" stroke-width="0.8" opacity="0.3"></line>
      <!-- Window dots -->
      <circle cx="16" cy="18" r="2" fill="#ffb347" opacity="0.5"></circle>
      <circle cx="23" cy="18" r="2" fill="#ffb347" opacity="0.3"></circle>
      <circle cx="30" cy="18" r="2" fill="#ffb347" opacity="0.2"></circle>
      <!-- Code: chevron brackets -->
      <path d="M20 36 L14 40 L20 44" stroke="#ffb347" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-amber)"></path>
      <path d="M52 36 L58 40 L52 44" stroke="#ffb347" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-amber)"></path>
      <!-- Slash -->
      <line x1="40" y1="33" x2="32" y2="47" stroke="#ffb347" stroke-width="1.5" stroke-linecap="round" opacity="0.8"></line>
      <!-- Cursor blink line -->
      <line x1="14" y1="52" x2="26" y2="52" stroke="#ffb347" stroke-width="1.2" stroke-linecap="round" opacity="0.35"></line>
      <rect x="27" y="49.5" width="4" height="5" rx="0.5" fill="#ffb347" opacity="0.7"></rect>
      <!-- Dot grid top-right corner decorative -->
      <circle cx="57" cy="18" r="0.8" fill="#ffb347" opacity="0.4"></circle>
      <circle cx="57" cy="18" r="0.8" fill="#ffb347" opacity="0.4"></circle>
    </svg>
