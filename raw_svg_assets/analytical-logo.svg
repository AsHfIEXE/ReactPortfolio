  <line x1="30" y1="22" x2="36" y2="36" stroke="#00c8ff" stroke-width="0.8" opacity="0.4"></line>
  <line x1="22" y1="28" x2="36" y2="36" stroke="#00c8ff" stroke-width="0.8" opacity="0.3"></line>
