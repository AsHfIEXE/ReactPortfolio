<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Access Denied | Salehin Ashfi</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --green: #00ff88;
      --cyan: #00d4ff;
      --purple: #a855f7;
      --red: #ff375f;
      --text: #f1f5f9;
      --muted: #475569;
      --secondary: #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Scanlines ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 100;
    }

    /* ── Animated grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--green);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
    }

    /* ── Main container ── */
    .container {
      text-align: center;
      z-index: 10;
      padding: 2rem;
      max-width: 700px;
    }

    /* ── Glitching 404 ── */
    .error-code {
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      position: relative;
      color: transparent;
      background: linear-gradient(135deg, var(--green) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      animation: glitchPulse 4s ease-in-out infinite;
      user-select: none;
    }
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--green) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .error-code::before {
      animation: glitchLeft 3s ease-in-out infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    }
    .error-code::after {
      animation: glitchRight 3s ease-in-out infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    }

    @keyframes glitchPulse {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(0,255,136,0.3)); }
      50% { filter: drop-shadow(0 0 60px rgba(0,212,255,0.4)); }
    }
    @keyframes glitchLeft {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-8px, 2px); }
      94% { transform: translate(4px, -1px); }
      96% { transform: translate(-3px, 1px); }
    }
    @keyframes glitchRight {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(6px, -2px); }
      93% { transform: translate(-5px, 1px); }
      95% { transform: translate(3px, -1px); }
    }

    /* ── Terminal block ── */
    .terminal {
      background: rgba(8, 8, 12, 0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      margin: 2.5rem auto;
      max-width: 550px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(12,12,18,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f56; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #27c93f; }
    .terminal-body {
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      text-align: left;
      line-height: 1.8;
      color: var(--green);
    }
    .cmd { color: var(--secondary); }
    .cmd::before { content: '$ '; color: var(--purple); }
    .out { margin-left: 1rem; }
    .out::before { content: '> '; color: var(--muted); }
    .err { color: var(--red); }
    .err::before { content: '✗ '; }
    .warn { color: #ffbd2e; }
    .warn::before { content: '⚠ '; }
    .blink {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: cursorBlink 1s step-end infinite;
      margin-left: 4px;
    }
    @keyframes cursorBlink { 50% { opacity: 0; } }

    /* ── Message ── */
    .subtitle {
      font-size: 1.1rem;
      color: var(--secondary);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .subtitle strong {
      color: var(--text);
    }

    /* ── CTA Button ── */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: rgba(0, 255, 136, 0.08);
      color: var(--green);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-home::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,255,136,0.15), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .btn-home:hover {
      border-color: var(--green);
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 30px rgba(0,255,136,0.25), inset 0 0 20px rgba(0,255,136,0.05);
    }
    .btn-home:hover::before { opacity: 1; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      margin-left: 1rem;
    }
    .btn-secondary:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.04);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.05);
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      opacity: 0.15;
    }
    .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); }

    /* ── Orbiting ring ── */
    .orbit-ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border: 1px solid rgba(0,255,136,0.06);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbitSpin 30s linear infinite;
    }
    .orbit-ring::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--green);
    }
    .orbit-ring-2 {
      width: 420px;
      height: 420px;
      border-color: rgba(0,212,255,0.04);
      animation-duration: 45s;
      animation-direction: reverse;
    }
    .orbit-ring-2::before { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }
    @keyframes orbitSpin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── Status line ── */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      background: rgba(8,8,12,0.9);
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      z-index: 50;
    }
    .status-bar .active { color: var(--green); }
    .status-bar .error { color: var(--red); }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .error-code { font-size: 7rem; }
      .terminal-body { font-size: 0.75rem; padding: 1rem; }
      .actions { flex-direction: column; align-items: stretch; }
      .btn-secondary { margin-left: 0; }
      .orbit-ring { width: 240px; height: 240px; }
      .orbit-ring-2 { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="grid-bg"></div>
  <div class="orbit-ring"></div>
  <div class="orbit-ring orbit-ring-2"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Particles (generated via JS) -->
  <div class="particles" id="particles"></div>

  <!-- Main content -->
  <div class="container">
    <div class="error-code">404</div>

    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="terminal-body" id="terminal-output">
        <!-- JS will type this out -->
      </div>
    </div>

    <p class="subtitle">
      The route you're looking for doesn't exist — or it's been <strong>classified</strong>.<br/>
      Either way, you don't have clearance.
    </p>

    <div class="actions">
      <a href="/" class="btn-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Return to Base
      </a>
      <a href="/#contact" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Report This
      </a>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span><span class="error">● DISCONNECTED</span>&nbsp;&nbsp;route: <span style="color:#94a3b8">/???</span></span>
    <span>ashfi.exe v2.0 &nbsp;|&nbsp; <span class="active">system nominal</span></span>
  </div>

  <script>
    // ── Floating particles ──
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
      container.appendChild(p);
    }

    // ── Terminal typing effect ──
    const lines = [
      { type: 'cmd', text: 'curl -sI ' + window.location.href },
      { type: 'err', text: 'HTTP/1.1 404 Not Found' },
      { type: 'cmd', text: 'nmap -sV --script=vuln target' },
      { type: 'out', text: 'Scanning for open routes...' },
      { type: 'warn', text: 'No valid endpoints discovered.' },
      { type: 'cmd', text: 'cat /var/log/access.log | tail -1' },
      { type: 'out', text: '"GET ' + window.location.pathname + ' — 404 — intruder detected"' },
      { type: 'cmd', text: 'echo "Redirecting to safe zone..."' },
    ];

    const terminal = document.getElementById('terminal-output');
    let lineIdx = 0;
    let charIdx = 0;
    let currentEl = null;

    function typeLine() {
      if (lineIdx >= lines.length) {
        // Add blinking cursor at the end
        const cursor = document.createElement('span');
        cursor.className = 'blink';
        currentEl.appendChild(cursor);
        return;
      }

      const line = lines[lineIdx];
      if (charIdx === 0) {
        currentEl = document.createElement('div');
        currentEl.className = line.type;
        terminal.appendChild(currentEl);
      }

      if (charIdx < line.text.length) {
        // Remove old cursor if present
        const oldCursor = currentEl.querySelector('.blink');
        if (oldCursor) oldCursor.remove();

        currentEl.appendChild(document.createTextNode(line.text[charIdx]));

        // Add cursor
        const cursor = document.createElement('span');
        cursor.className = 'blink';
        currentEl.appendChild(cursor);

        charIdx++;
        setTimeout(typeLine, 15 + Math.random() * 25);
      } else {
        // Remove cursor from finished line
        const oldCursor = currentEl.querySelector('.blink');
        if (oldCursor) oldCursor.remove();

        lineIdx++;
        charIdx = 0;
        setTimeout(typeLine, 400 + Math.random() * 300);
      }
    }

    // Start typing after a short delay
    setTimeout(typeLine, 600);

    // ── Dynamic route in status bar ──
    document.querySelector('.status-bar span span[style]').textContent = window.location.pathname;
  </script>
</body>
</html>
